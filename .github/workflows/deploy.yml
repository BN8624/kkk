# 한 줄 목적: main 푸시 시 lint·타입·단위·E2E·빌드가 모두 성공해야 GitHub Pages로 배포한다
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  core:
    name: Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: production-dist
          path: dist
          if-no-files-found: error

  scenario:
    name: Scenario
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:scenario

  determinism:
    name: Determinism
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run determinism
      - name: Upload determinism evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: determinism-evidence
          path: |
            artifacts/determinism-summary.json
            artifacts/determinism-summary.md
            artifacts/determinism-failure-*.json
          if-no-files-found: warn
          retention-days: 14

  simulation:
    name: Simulation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run simulate:campaign
      - name: Upload campaign simulation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: campaign-simulation-evidence
          path: |
            artifacts/campaign-sim-summary.json
            artifacts/campaign-sim-summary.md
          if-no-files-found: warn
          retention-days: 14

  e2e:
    name: E2E
    needs: [core, scenario, determinism, simulation]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium webkit
      - run: npx playwright test
      - run: npm run test:e2e:dist
      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          retention-days: 7

  package-pages:
    name: Package Pages
    needs: [core, scenario, determinism, simulation, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: production-dist
          path: dist
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: package-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
